backend:
  name: git-gateway
  repo: thetruckercodex/thetruckercodex.github.io
  branch: master

media_folder: "assets/images" 
public_folder: "/assets/images"

collections:
  - name: "posts"
    label: "Compliance Posts"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Layout", name: "layout", widget: "hidden", default: "post"}
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Publish Date", name: "date", widget: "datetime"}
      - {label: "Category", name: "categories", widget: "select", 
         options: ["FMCSA Basics", "HOS & ELD", "Safety Audits", "Maintenance", "DQF", "Recordkeeping"]}
      - {label: "Meta Description", name: "description", widget: "text"}
      - {label: "Featured Image", name: "image", widget: "image", required: false}
      - {label: "Image Alt Text (SEO)", name: "image_alt", widget: "string", required: false, hint: "Describe the image for search engines (e.g., FMCSA SAVE Verification Workflow 2026)"}
      - {label: "Body Content (Paste AI Text Here)", name: "body", widget: "markdown"}
