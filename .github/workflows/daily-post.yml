name: Daily Blog Automation

on:
  schedule:
    # Sabah yazısı (Regulatory) - 09:00 EST = 14:00 UTC
    - cron: '0 14 * * *'
    # Akşam yazısı (OI) - 18:00 EST = 23:00 UTC
    - cron: '0 23 * * *'
  workflow_dispatch:
    inputs:
      post_type:
        description: 'Post type to generate'
        required: true
        default: 'regulatory'
        type: choice
        options:
          - regulatory
          - oi

jobs:
  generate-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install anthropic requests python-frontmatter matplotlib

      - name: Determine post type
        id: post_type
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ github.event.inputs.post_type }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 14 * * *" ]; then
            # Hangi cron ifadesinin tetiklediğini DOĞRUDAN GitHub'dan al -- eskiden
            # "su an saat 14 mu" diye çalışma anındaki saate bakılıyordu, ama
            # GitHub Actions'ın zamanlanmış tetikleyicileri dakikalarca/saatlerce
            # gecikebiliyor (resmen bilinen bir davranış); bu gecikme "regulatory"
            # slotunun saat 14'ü kaçırıp sessizce "oi"ye düşmesine, ve OI havuzu
            # tükendiğinde haftalarca hiç yeni regulatory yazı üretilememesine
            # sebep oluyordu (bkz. Temmuz 2026 kesintisi).
            echo "type=regulatory" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 23 * * *" ]; then
            echo "type=oi" >> $GITHUB_OUTPUT
          else
            # Beklenmeyen bir schedule değeri (ör. manuel/başka bir tetikleyici) --
            # eski saat-aralığı mantığına güvenli şekilde düş, ama TAM eşitlik
            # yerine makul bir pencere kullan.
            HOUR=$(date -u +%H)
            if [ "$HOUR" -ge 13 ] && [ "$HOUR" -le 16 ]; then
              echo "type=regulatory" >> $GITHUB_OUTPUT
            else
              echo "type=oi" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Fetch regulatory data
        if: steps.post_type.outputs.type == 'regulatory'
        run: python scripts/fetch_regulations.py
        env:
          POST_TYPE: regulatory

      - name: Generate post
        run: python scripts/generate_post.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          POST_TYPE: ${{ steps.post_type.outputs.type }}

      - name: Quality check
        run: python scripts/quality_check.py

      - name: Generate chart (OI posts only)
        if: steps.post_type.outputs.type == 'oi'
        run: python scripts/generate_chart.py
        continue-on-error: true

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Trucker Codex Autopilot"
          git add _posts/ _data/ assets/
          git diff --staged --quiet || git commit -m "Auto: $(cat /tmp/post_title.txt)"
          git push
