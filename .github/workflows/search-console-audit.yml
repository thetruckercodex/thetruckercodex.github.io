name: Search Console Audit

on:
  schedule:
    - cron: '0 6 * * 1'   # Her Pazartesi 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  gsc-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-auth google-api-python-client

      - name: Run Search Console audit
        env:
          GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
        run: python scripts/gsc_audit.py

      - name: Commit updated data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/gsc_performance.json _data/gsc_indexing.json
          git diff --staged --quiet || git commit -m "Auto: Search Console verisi guncellendi ($(date -u +%Y-%m-%d))"
          git push
