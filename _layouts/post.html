---
layout: default
---

<article class="post">
  <h1>{{ page.title }}</h1>

  {% if page.featured_image %}
    <div class="featured-image">
      <img src="{{ page.featured_image | relative_url }}" alt="{{ page.title }}" style="max-width: 100%; height: auto; border-radius: 8px; margin-bottom: 20px; display: block;">
    </div>
  {% endif %}

  <div class="entry">
    {{ content }}
  </div>

  <div class="date">
    Written on {{ page.date | date: "%B %e, %Y" }}
  </div>
</article>
