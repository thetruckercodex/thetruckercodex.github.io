---
layout: default
---

<article class="post">
  <h1>{{ page.title }}</h1>

  {% if page.image %}
    <div class="featured-image">
      <img src="{{ page.image | relative_url }}" 
     alt="{{ page.image_alt | default: page.title | strip_html | strip_newlines | escape }}" 
     style="width:100%; height:auto; border-radius: 8px; margin-bottom: 25px; display: block;">
    </div>
  {% endif %}

  <div class="entry">
    {{ content }}
  </div>

  <div class="date">
    Written on {{ page.date | date: "%B %e, %Y" }}
  </div>
</article>
